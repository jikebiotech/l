<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jike Biotech</title>
<meta name="description" content="Jike Biotech (Guangzhou) Co., Ltd. - High Purity Peptide Powder">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:linear-gradient(160deg,#f0f5ff 0%,#e8eef8 50%,#dce6f5 100%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:2rem 1.5rem;
  color:#1a1a2e;
  line-height:1.5;
}

/* ===== CONTAINER ===== */
.container{
  width:100%;
  max-width:420px;
  margin:0 auto;
}

/* ===== HEADER ===== */
.header{
  text-align:center;
  margin-bottom:2rem;
}
.avatar{
  width:96px;height:96px;
  border-radius:50%;
  background:linear-gradient(135deg,#1c499e,#00aeef);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 1rem;
  font-size:2rem;
  font-weight:700;
  color:#fff;
  box-shadow:0 4px 20px rgba(28,73,158,0.25);
}
.header h1{
  font-size:1.35rem;
  font-weight:700;
  color:#1c499e;
  letter-spacing:-0.02em;
}
.header p{
  font-size:0.85rem;
  color:#5a6a7e;
  margin-top:0.25rem;
  max-width:320px;
  margin-left:auto;
  margin-right:auto;
}

/* ===== DIVIDER ===== */
.divider{
  width:48px;height:3px;
  background:linear-gradient(90deg,#1c499e,#00aeef);
  border-radius:2px;
  margin:0 auto 1.5rem;
}

/* ===== LINKS ===== */
.links{display:flex;flex-direction:column;gap:0.75rem}
.link-card{
  display:flex;
  align-items:center;
  gap:0.875rem;
  padding:0.875rem 1.25rem;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.6);
  border-radius:14px;
  text-decoration:none;
  color:#1a1a2e;
  font-size:0.95rem;
  font-weight:500;
  transition:all 0.25s ease;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  position:relative;
  overflow:hidden;
}
.link-card::before{
  content:'';
  position:absolute;inset:0;
  opacity:0;
  transition:opacity 0.3s ease;
  border-radius:14px;
}
.link-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(28,73,158,0.12);
  border-color:rgba(28,73,158,0.15);
}
.link-card:active{transform:translateY(0);scale:0.98}
.link-card .icon-wrap{
  flex-shrink:0;
  width:40px;height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.25rem;
  transition:transform 0.3s ease;
}
.link-card:hover .icon-wrap{transform:scale(1.08)}
.link-card .label{flex:1;min-width:0}
.link-card .label span{display:block}
.link-card .label .title{font-weight:600}
.link-card .label .sub{font-size:0.75rem;color:#7a8a9e;margin-top:1px}
.link-card .arrow{
  flex-shrink:0;
  color:#b0bec5;
  font-size:1.1rem;
  transition:transform 0.25s ease,color 0.25s ease;
}
.link-card:hover .arrow{
  transform:translateX(3px);
  color:#1c499e;
}

/* ===== ICON COLORS ===== */
.icon-website{background:linear-gradient(135deg,#1c499e,#3068c8);color:#fff}
.icon-tiktok{background:linear-gradient(135deg,#010101,#333);color:#fff}
.icon-instagram{background:linear-gradient(135deg,#f58529,#dd2a7b,#8134af);color:#fff}
.icon-threads{background:linear-gradient(135deg,#000,#555);color:#fff}
.icon-whatsapp{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff}

/* ===== SOCIAL ROW ===== */
.social-row{
  display:flex;
  justify-content:center;
  gap:1rem;
  margin-top:1.5rem;
}
.social-icon{
  width:44px;height:44px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  font-size:1.25rem;
  color:#5a6a7e;
  background:rgba(255,255,255,0.7);
  border:1px solid rgba(0,0,0,0.06);
  transition:all 0.25s ease;
}
.social-icon:hover{
  background:#fff;
  color:#1c499e;
  border-color:rgba(28,73,158,0.2);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(28,73,158,0.1);
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;
  margin-top:2rem;
  font-size:0.75rem;
  color:#8a9aa8;
}

/* ===== SVG ICONS ===== */
.icon-svg{width:22px;height:22px;fill:currentColor}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){
  body{padding:1.5rem 1rem}
  .avatar{width:80px;height:80px;font-size:1.7rem}
  .header h1{font-size:1.2rem}
  .link-card{padding:0.75rem 1rem;font-size:0.9rem}
  .link-card .icon-wrap{width:36px;height:36px;font-size:1.1rem}
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
.container>*{animation:fadeUp 0.5s ease both}
.links .link-card:nth-child(1){animation-delay:0.1s}
.links .link-card:nth-child(2){animation-delay:0.18s}
.links .link-card:nth-child(3){animation-delay:0.26s}
.links .link-card:nth-child(4){animation-delay:0.34s}
.links .link-card:nth-child(5){animation-delay:0.42s}
</style>
